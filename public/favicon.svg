<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="url(#accent)" stroke-width="1.8" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="3" fill="url(#accent)" opacity="0.9"/>
  <line x1="16" y1="5" x2="16" y2="10" stroke="url(#accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="22" x2="16" y2="27" stroke="url(#accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="5" y1="16" x2="10" y2="16" stroke="url(#accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="16" x2="27" y2="16" stroke="url(#accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
